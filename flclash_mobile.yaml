# flclash_mobile.yaml — ChromeGo 免费节点配置（自动生成）
# 由 gen_mobile_config.py 从 mihomo config.yaml 提取最新节点 IP 生成
# 手动修改会被覆盖！请修改 mihomo config.yaml 中的节点定义。

# 机型支持：手机 FlClash / Clash Meta for Android / Surfboard
# 规则语法：标准 Clash DOMAIN-SUFFIX / GEOIP / MATCH（兼容所有客户端）

# ── 核心 ──
mixed-port: 18990
external-controller: 127.0.0.1:19090
allow-lan: false
ipv6: false
log-level: info
mode: rule
find-process-mode: off
geodata-mode: true
geo-auto-update: true
geo-update-interval: 86400

# ── DNS ──
dns:
  enable: true
  listen: 0.0.0.0:5353
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

