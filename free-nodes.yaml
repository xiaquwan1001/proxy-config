# ═══════════════════════════════════════════════════════
# ChromeGo 免费节点 + Loyalsoldier 规则集
# 适用于 Clash Meta / mihomo 内核
# 自动生成，手动修改会被覆盖
# ═══════════════════════════════════════════════════════

# ── 核心 ──
mixed-port: 18990
external-controller: 127.0.0.1:19090
allow-lan: false
ipv6: false
log-level: info
mode: rule
find-process-mode: off
geodata-mode: true
geo-auto-update: true
geo-update-interval: 86400

# ── DNS ──
dns:
  enable: true
  listen: 0.0.0.0:5353
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32

# ── 规则提供者（Loyalsoldier）──
# 首次启动：Clash 异步下载，下载失败不阻塞，由 MATCH 兜底
rule-providers:
  reject:
    type: http
    behavior: classical
    url: "https://github.com/Loyalsoldier/clash-rules/releases/latest/download/reject.txt"
    interval: 86400
  proxy:
    type: http
    behavior: classical
    url: "https://github.com/Loyalsoldier/clash-rules/releases/latest/download/proxy.txt"
    interval: 86400
  direct:
    type: http
    behavior: classical
    url: "https://github.com/Loyalsoldier/clash-rules/releases/latest/download/direct.txt"
    interval: 86400

