# ── 代理组 ──
proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - 🆓 免费节点
      - 🆕 FreeProxyGo
      - DIRECT
  - name: 🆕 FreeProxyGo
    type: url-test
    filter: "ProxyGo"
    url: https://www.gstatic.com/generate_204
    interval: 120
  - name: 🆓 免费节点
    type: url-test
    proxies:
      - hy2-fr1
      - hy2-xyz
      - hy2-fr2
      - tuic-oth1
      - tuic-oth2
      - hy1-fr1
      - hy1-fr2
      - hy1-ipv6
      - mieru-ch1
      - mieru-ch2
      - vless-reality-ch1
      - vless-reality-ch2
      - vless-reality-ch3
    url: https://www.gstatic.com/generate_204
    interval: 120

# ── 分流规则 ──
# Loyalsoldier 规则集异步下载，失败时由 GEOIP/MATCH 兜底
rules:
  - RULE-SET,reject,REJECT
  - RULE-SET,proxy,Proxy
  - RULE-SET,direct,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
